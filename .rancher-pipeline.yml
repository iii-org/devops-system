stages:
  - name: Flatten secrets to files
    steps:
    - runScriptConfig:
        image: alpine
        shellScript: mkdir ~/.kube; echo $k8s_config > ~/.kube/config; echo $environments_json > environments.json;
      envFrom:
      - sourceName: devops-api
        sourceKey: environments_json
        targetKey: environments_json
      - sourceName: devops-api
        sourceKey: k8s_config
        targetKey: k8s_config
  - name: Publish flask image
    steps:
    - publishImageConfig:
        dockerfilePath: ./Dockerfile
        buildContext: .
        tag: ${CICD_GIT_REPO_NAME}/${CICD_GIT_BRANCH}-${CICD_EXECUTION_SEQUENCE}
        pushRemote: true
        registry: 10.20.0.71:5443
      env:
        PLUGIN_INSECURE: "true"
        PLUGIN_MTU: "1000"
  - name: deploy ${CICD_GIT_REPO_NAME}-${CICD_GIT_BRANCH} environment
    steps:
    - applyYamlConfig:
        path: ./k8s-yaml/flask-deployment.yaml
    - applyYamlConfig:
        path: ./k8s-yaml/flask-service.yaml
